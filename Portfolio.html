<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            margin: 0;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        img {
            width: 100px;
            border-radius: 50%;
        }

        h1 {
            color: #333;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #007BFF;
            color: white;
            margin: 5px;
            padding: 8px;
            border-radius: 5px;
        }

        .footer {
            margin-top: 20px;
            color: gray;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>My Portfolio</h1>
    <div class="card">
        <img src="Kaviya.avif" alt="profile" width="150">
        <h2>Your Name</h2>
        <p>B.Tech - CSE</p>
        <p>Your College</p>
    </div>
    <div class="card">
        <h3>Skills</h3>
        <ul>
            <li>Java</li>
            <li>Python</li>
            <li>HTML</li>
        </ul>
    </div>

    <div class="card">
        <h3>About Me</h3>
        <p>I am learning coding and building projects using GitHub.</p>
    </div>
    <div class="footer">
        <p>© 2026 Your Name</p>
    </div>
</div>
</body>
</html>
